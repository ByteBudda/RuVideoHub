name: Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Фиксим ворнинг из логов: принудительно запускаем Node.js 24 для экшенов
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        # Включаем встроенное кэширование, чтобы сборка шла быстрее
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # Вот этот шаг вытащит файл из виртуалки на страницу GitHub Actions
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RutubeApp-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error # Если путь не совпадет, сборка упадет с понятной ошибкой
        retention-days: 7 # Артефакт будет храниться неделю, потом удалится сам
