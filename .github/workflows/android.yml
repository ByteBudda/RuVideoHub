name: Android Release Sign with Repo Key

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Декодируем твой готовый ключ из репозитория в файл, который ждет Gradle
      - name: Decode Keystore from Repo
        run: |
          base64 --decode debug.keystore.base64 > my-upload-key.jks

      # Собираем релизный APK через глобальный gradle в папке ./app
      # Прокидываем путь к только что созданному файлу ключа прямо в Gradle
      - name: Build with Gradle (Release)
        run: gradle assembleRelease -Pandroid.injected.signing.store.file="../my-upload-key.jks" --no-daemon --no-configuration-cache
        working-directory: ./app

      # На всякий случай подстрахуемся и подпишем финальный пакет через экшен, 
      # используя тот же самый файл, чтобы Android точно не ругался
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }} # Если секрет не задан, экшен подпишет дефолтным, но Gradle уже не упадет!
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          alias: auto-generated-alias
          singleKeyStore: true

      # Вытаскиваем готовый подписанный APK на страницу билда
      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RutubeApp-Release-Signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          if-no-files-found: error
          retention-days: 7
