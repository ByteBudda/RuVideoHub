name: Android Release Sign with Repo Key

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Если секреты добавлены во вкладку Environment, раскомментируй строку ниже 
    # и укажи точное название твоего окружения на GitHub (например, release):
    # environment: release

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Тест на проверку секретов, чтобы исключить пустые строки
      - name: Check Secrets Presence
        run: |
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then echo "⚠️ ALIAS IS EMPTY!"; else echo "✅ Alias is set"; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then echo "⚠️ STORE PASSWORD IS EMPTY!"; else echo "✅ Store password is set"; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then echo "⚠️ KEY PASSWORD IS EMPTY!"; else echo "✅ Key password is set"; fi
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then echo "⚠️ BASE64 KEYSTORE IS EMPTY!"; else echo "✅ Base64 Keystore is set"; fi

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > bytebudda.keystore

      # Этап 1: Собираем стандартную версию (с апдейтером)
      - name: Build Standard Release
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file="../bytebudda.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon --no-configuration-cache
        working-directory: ./app

      # Переименовываем стандартный APK, чтобы его не стёрло следующей сборкой
      - name: Rename Standard APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/RuVideoHub-Standard.apk

      # Этап 2: Собираем F-Droid версию (без апдейтера)
      - name: Build F-Droid Release
        run: |
          gradle assembleRelease -Pfdroid=true \
            -Pandroid.injected.signing.store.file="../bytebudda.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon --no-configuration-cache
        working-directory: ./app

      # Переименовываем F-Droid APK
      - name: Rename F-Droid APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/RuVideoHub-FDroid.apk

      # Выгружаем оба файла в релизы GitHub
      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/RuVideoHub-Standard.apk
            app/build/outputs/apk/release/RuVideoHub-FDroid.apk
          tag_name: nightly-${{ github.run_number }}
          name: Nightly Build #${{ github.run_number }}
          draft: true
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
