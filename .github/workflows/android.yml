name: Android Release Auto-Sign

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Собираем релизный APK (используем твою рабочую команду gradle)
      # Заменили assembleDebug на assembleRelease
      - name: Build with Gradle (Release)
        run: gradle assembleRelease --no-daemon --no-configuration-cache
        working-directory: ./app

      # Автоматически генерируем ключ и подписываем им APK
      - name: Sign Release APK (Auto Generated Key)
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          # Указываем путь к собранному релизному APK внутри твоей папки ./app
          releaseDirectory: app/build/outputs/apk/release
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          alias: auto-generated-alias
          singleKeyStore: true

      # Вытаскиваем готовый подписанный APK на страницу билда
      - name: Upload Signed APK Artifact
         uses: actions/upload-artifact@v4
        with:
          name: RutubeApp-Release-Signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          if-no-files-found: error
          retention-days: 7
