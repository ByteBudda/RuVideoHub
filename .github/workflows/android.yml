name: Android Release Auto-Sign

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Собираем релизный APK
    - name: Build Release APK
      run: ./gradlew assembleRelease

    # Генерируем рандомный ключ и сразу подписываем им билд
    - name: Sign Release APK (Auto Generated Key)
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        # Передаем пароли из секретов
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
        # Эти параметры заставят экшен САМОМУ создать валидный ключ с рандомным алиасом
        alias: auto-generated-alias
        singleKeyStore: true

    # Забираем готовый подписанный APK
    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RutubeApp-Release-Signed
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
        if-no-files-found: error
        retention-days: 7
